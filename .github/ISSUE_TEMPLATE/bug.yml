name: Bug
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [Parser, Curator, API, Deploy, CF-AI, KV-Cache]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Critical, High, Medium, Low]
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options: [XS, S, M, L, XL]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
